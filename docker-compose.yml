services:
  redis:
    image: redis:7-alpine
    container_name: fmp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - fmp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  fmp-llm-service:
    build: .
    container_name: fmp-llm-service
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file:
      - .env
    volumes:
      # Persister les modèles téléchargés
      - ./dl_models:/app/dl_models
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - fmp-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery-worker:
    build: .
    container_name: fmp-celery-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      # Partager les modèles avec l'API
      - ./dl_models:/app/dl_models
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - fmp-network
    depends_on:
      redis:
        condition: service_healthy

networks:
  fmp-network:
    external: true
